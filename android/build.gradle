plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
    id 'maven-publish'
}

group = 'com.github.juanvegu'
version = '1.0.5'

android {
    namespace 'com.scotia.rnnetwork.contracts'
    compileSdk 34
    defaultConfig { minSdk 24 }
    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = 'com.github.juanvegu'
                artifactId = 'rn-network-contracts'
                version = '1.0.5'
            }
        }
    }
}
